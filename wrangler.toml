name = "akart-ecommerce"
main = "server/index.js"
type = "javascript"
compatibility_date = "2024-01-01"

# Environment variables
env.production.vars = { ENVIRONMENT = "production" }
env.development.vars = { ENVIRONMENT = "development" }

# Bindings for KV storage (optional)
[[env.production.kv_namespaces]]
binding = "CART_KV"
id = "your-kv-namespace-id"
preview_id = "your-preview-kv-namespace-id"

# Environment variables from .env file
[env.production.vars]
SUPABASE_URL = ""
SUPABASE_SERVICE_ROLE_KEY = ""
SUPABASE_ANON_KEY = ""
JWT_SECRET = ""
RAZORPAY_KEY_ID = ""
RAZORPAY_KEY_SECRET = ""

[env.development.vars]
SUPABASE_URL = ""
SUPABASE_SERVICE_ROLE_KEY = ""
SUPABASE_ANON_KEY = ""
JWT_SECRET = ""
RAZORPAY_KEY_ID = ""
RAZORPAY_KEY_SECRET = ""

# Build configuration
[build]
command = "npm install"
cwd = "."

# Routes configuration
[[routes]]
pattern = "example.com/*"
zone_name = "example.com"

# Triggers for cron jobs (optional)
[[triggers.crons]]
crons = ["0 0 * * *"]
